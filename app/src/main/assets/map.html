<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Leaflet : sert uniquement à DESSINER la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #carte { height: 100%; margin: 0; }
    </style>
</head>
<body>
<div id="carte"></div>
<script>
    // Création de la carte, centrée sur la France par défaut.
    var carte = L.map('carte').setView([46.6, 2.3], 5);

    // Fond de carte OpenStreetMap (gratuit et libre).
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(carte);

    // Petit utilitaire : échappe le texte pour éviter de casser le HTML de la bulle.
    function echap(texte) {
        return String(texte)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    // Fonction globale appelée par le clic sur le titre dans la bulle.
    // Elle prévient le code Java (via le pont "Android") d'ouvrir la fiche.
    function ouvrirFicheJs(id) {
        if (window.Android && Android.ouvrirFiche) {
            Android.ouvrirFiche(String(id));
        }
    }

    // Fonction appelée DEPUIS le code Java (CarteFragment) avec la liste des fiches.
    function ajouterMarqueurs(fiches) {
        var points = [];
        var dejaVus = {}; // compte combien de fiches sont déjà placées à une position
        // forEach donne un "f" propre à chaque fiche.
        fiches.forEach(function (f) {
            if (f.lat === 0 && f.lon === 0) return; // position non renseignée

            // Si plusieurs fiches sont au MÊME endroit, on décale un peu les
            // suivantes vers la droite, pour qu'elles ne se cachent pas et
            // restent toutes cliquables.
            var cle = f.lat.toFixed(5) + "," + f.lon.toFixed(5);
            var n = dejaVus[cle] || 0;       // combien de fiches déjà placées ici ?
            dejaVus[cle] = n + 1;
            var lon = f.lon + n * 0.00015;   // 1re fiche : 0 ; 2e : un peu ; 3e : un peu plus

            var m = L.marker([f.lat, lon]).addTo(carte);

            // La bulle reste affichée au clic sur le marqueur. Le TITRE y est un
            // lien cliquable : cliquer dessus ouvre la fiche correspondante.
            var html = '<b><a href="#" onclick="ouvrirFicheJs(' + f.id + '); return false;">'
                + echap(f.titre) + '</a></b><br>' + echap(f.rue);
            m.bindPopup(html);

            points.push([f.lat, lon]);
        });
        // On ajuste le zoom pour voir tous les marqueurs d'un coup.
        if (points.length > 0) carte.fitBounds(points);
    }
</script>
</body>
</html>
